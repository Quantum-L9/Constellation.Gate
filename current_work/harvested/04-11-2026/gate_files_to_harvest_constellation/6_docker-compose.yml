version: "3.9"

services:
  gate:
    image: constellation-gate:latest
    container_name: constellation-gate
    restart: unless-stopped
    command: ["sh", "/app/scripts/entrypoint.sh"]
    env_file:
      - ../.env.example
    environment:
      L9_ENVIRONMENT: local
      GATE_LOCAL_NODE: gate
      HOST: 0.0.0.0
      PORT: 9000
      L9_DEV_MODE: "true"
      L9_REQUIRE_SIGNATURE: "false"
      L9_REPLAY_ENABLED: "true"
    ports:
      - "9000:9000"
    volumes:
      - ../:/app
    working_dir: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/v1/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gate_net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: constellation-gate-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.rules.yml:/etc/prometheus/rules/gate.rules.yml:ro
      - ../deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gate
    networks:
      - gate_net

networks:
  gate_net:
    driver: bridge
