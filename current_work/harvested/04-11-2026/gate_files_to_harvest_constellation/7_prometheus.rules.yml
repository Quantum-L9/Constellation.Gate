groups:
  - name: constellation-gate
    rules:
      - alert: GateHealthDown
        expr: up{job="constellation-gate"} == 0
        for: 2m
        labels:
          severity: critical
          service: constellation-gate
        annotations:
          summary: "Gate is down"
          description: "Prometheus has not been able to scrape the Gate target for 2 minutes."

      - alert: GateFailureRateHigh
        expr: increase(constellation_gate_requests_total{status="failed"}[5m]) > 25
        for: 5m
        labels:
          severity: warning
          service: constellation-gate
        annotations:
          summary: "Gate failure rate elevated"
          description: "Gate failed request count exceeded 25 in the last 5 minutes."

      - alert: GateInFlightSustainedHigh
        expr: constellation_gate_in_flight_requests > 100
        for: 10m
        labels:
          severity: warning
          service: constellation-gate
        annotations:
          summary: "Gate in-flight requests elevated"
          description: "Gate has sustained more than 100 in-flight requests for 10 minutes."

      - alert: GateDispatchSpike
        expr: increase(constellation_gate_dispatches_total[5m]) > 500
        for: 5m
        labels:
          severity: info
          service: constellation-gate
        annotations:
          summary: "Gate dispatch volume spike"
          description: "Dispatch volume exceeded 500 in the last 5 minutes."

      - alert: GateExecutionLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(constellation_gate_execution_latency_seconds_bucket[5m])) by (le, action)) > 2
        for: 10m
        labels:
          severity: warning
          service: constellation-gate
        annotations:
          summary: "Gate p95 execution latency high"
          description: "Gate p95 execution latency exceeded 2 seconds over the last 10 minutes."
