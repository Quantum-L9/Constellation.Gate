repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi>=0.115.0
          - httpx>=0.27.0
          - pydantic>=2.8.0
          - pyyaml>=6.0.2
          - types-PyYAML
          - constellation-node-sdk @ git+https://github.com/Quantum-L9/Gate_SDK.git@0d50f64574f78a8ad9c32f5c4e13fcbf5644648e
        files: ^src/

