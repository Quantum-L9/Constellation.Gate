# Relocated from constellation-gate/.github/workflows/integration.yml —
# workflows in a subdirectory are never executed by GitHub Actions. Actions
# are pinned to immutable commit SHAs (provenance lock).
name: integration
on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: gate-integration-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    working-directory: constellation-gate
jobs:
  integration-tests:
    name: gate-integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: constellation-gate/pyproject.toml
      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Run integration tests
        run: |
          pytest -q tests/integration
