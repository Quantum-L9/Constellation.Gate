# Relocated from constellation-gate/.github/workflows/ci.yml — workflows in a
# subdirectory are never executed by GitHub Actions; this repo had zero
# working CI until this move. Actions are pinned to immutable commit SHAs
# (provenance lock); the package installs from the constellation-gate/ subdir.
name: ci
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions:
  contents: read
concurrency:
  group: gate-ci-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    working-directory: constellation-gate
jobs:
  quality:
    name: lint-type-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: constellation-gate/pyproject.toml
      - name: Upgrade packaging toolchain
        run: |
          python -m pip install --upgrade pip setuptools wheel
      - name: Install package with dev dependencies
        run: |
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check src tests
      - name: Ruff format check
        run: |
          ruff format --check src tests scripts
      - name: Mypy
        run: |
          mypy src
      - name: Pytest
        run: |
          pytest -q
      - name: Contract invariants
        run: |
          python scripts/validate_contracts.py
